<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LANISTA IQ — Athlete Intelligence Platform</title>
<meta name="description" content="LANISTA IQ — one unified sports intelligence platform for Players, Coaches, and Admins. Turn athlete data into insight and action."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Barlow:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ══════════════════════════════════════════════════════════════
   LANISTA IQ — UNIFIED DESIGN SYSTEM
══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* surfaces */
  --ink:#08090b; --bg:#0b0c0e; --panel:#101216; --panel-2:#15181d; --panel-3:#1b1f26;
  --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.12);
  /* brand */
  --gold:#C9A84C; --gold-2:#E8C96B; --gold-3:#F5DFA0; --gold-dim:#8a6d2e;
  --white:#F4F5F7; --silver:#C5C8CC; --steel:#8A93A0; --muted:#5c636e;
  /* core4 dimension hues */
  --talent:#C9A84C; --character:#a78bfa; --mentality:#4ade80; --alignment:#60a5fa;
  /* semantic */
  --pos:#4ade80; --neg:#f87171; --warn:#f59e0b; --info:#60a5fa;
  /* type */
  --f-d:'Barlow Condensed',sans-serif; --f-b:'Barlow',sans-serif; --f-m:'IBM Plex Mono',monospace;
  --ease:cubic-bezier(.4,0,.2,1);
  --sidebar-w:248px; --topbar-h:60px; --radius:14px; --radius-sm:10px;
  --shadow:0 8px 30px rgba(0,0,0,.35);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:var(--f-b);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:var(--f-b);border:none;outline:none;cursor:pointer;color:inherit;background:none}
canvas{display:block}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,.35)}
.hidden{display:none!important}
.mono{font-family:var(--f-m)}
.mut{color:var(--steel)}
.pos{color:var(--pos)} .neg{color:var(--neg)} .warnc{color:var(--warn)}

/* ── APP SHELL ── */
#app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:linear-gradient(180deg,var(--ink),var(--bg));border-right:1px solid var(--line);position:fixed;top:0;bottom:0;left:0;z-index:60;display:flex;flex-direction:column;transition:transform .3s var(--ease)}
.sb-brand{padding:18px 20px 14px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line)}
.sb-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--gold-2),var(--gold-dim));display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-weight:900;color:#1a1206;font-size:18px;flex-shrink:0;box-shadow:0 2px 10px rgba(201,168,76,.3)}
.sb-word{font-family:var(--f-d);font-weight:900;letter-spacing:2.5px;font-size:17px;line-height:1;text-transform:uppercase}
.sb-word small{display:block;font-family:var(--f-m);font-size:8px;letter-spacing:3px;color:var(--steel);font-weight:500;margin-top:3px}
.sb-nav{flex:1;overflow-y:auto;padding:14px 12px}
.sb-section{font-family:var(--f-m);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);padding:14px 12px 8px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--steel);font-weight:500;font-size:14px;cursor:pointer;transition:all .16s var(--ease);margin-bottom:2px;position:relative}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--white)}
.nav-item.active{background:linear-gradient(90deg,rgba(201,168,76,.16),rgba(201,168,76,.03));color:var(--gold-2)}
.nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--gold)}
.nav-ico{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:.9}
.nav-ico svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.7}
.nav-badge{margin-left:auto;font-family:var(--f-m);font-size:9px;font-weight:700;background:var(--gold);color:#1a1206;border-radius:20px;padding:1px 7px}
.sb-foot{border-top:1px solid var(--line);padding:12px}
.role-pill-wrap{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:10px}
.role-pill{flex:1;font-family:var(--f-m);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 4px;border-radius:7px;color:var(--steel);transition:all .18s;text-align:center}
.role-pill.active{background:var(--gold);color:#1a1206}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 6px}
.sb-user .av{width:34px;height:34px;border-radius:50%;background:rgba(201,168,76,.12);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-weight:800;color:var(--gold);font-size:13px}
.sb-user .nm{font-size:13px;font-weight:600;line-height:1.2}
.sb-user .rl{font-family:var(--f-m);font-size:9px;color:var(--steel);text-transform:uppercase;letter-spacing:1px}

/* main */
.main{flex:1;margin-left:var(--sidebar-w);min-width:0;display:flex;flex-direction:column}
.topbar{height:var(--topbar-h);position:sticky;top:0;z-index:50;background:rgba(11,12,14,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 26px}
.tb-menu{display:none;font-size:22px;color:var(--white)}
.tb-crumb{display:flex;flex-direction:column}
.tb-crumb .kick{font-family:var(--f-m);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--steel)}
.tb-crumb .ttl{font-family:var(--f-d);font-size:20px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;line-height:1}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.tb-search{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;width:220px;transition:border-color .2s}
.tb-search:focus-within{border-color:rgba(201,168,76,.4)}
.tb-search svg{width:15px;height:15px;stroke:var(--steel);fill:none;stroke-width:2}
.tb-search input{background:none;border:none;outline:none;color:var(--white);font-size:13px;width:100%}
.tb-icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center;position:relative;transition:all .18s}
.tb-icon-btn:hover{border-color:rgba(201,168,76,.4)}
.tb-icon-btn svg{width:17px;height:17px;stroke:var(--silver);fill:none;stroke-width:1.8}
.tb-dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--gold);border:2px solid var(--panel)}
.view{padding:26px;max-width:1360px;width:100%;margin:0 auto;flex:1}

/* ── HERO / PAGE HEADER ── */
.page-hero{display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap;margin-bottom:22px}
.page-hero .lead{flex:1;min-width:220px}
.page-hero h1{font-family:var(--f-d);font-size:30px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;line-height:1.02}
.page-hero p{color:var(--steel);font-size:14px;margin-top:5px;max-width:640px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-d);font-weight:800;font-size:13px;letter-spacing:1.4px;text-transform:uppercase;padding:10px 18px;border-radius:10px;border:1px solid var(--line-2);color:var(--white);background:var(--panel-2);transition:all .18s}
.btn:hover{border-color:rgba(201,168,76,.5);background:var(--panel-3)}
.btn.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#1a1206;border-color:transparent}
.btn.gold:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 13px;font-size:11px;letter-spacing:1px}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}

/* ── CARDS ── */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);transition:border-color .2s,transform .2s}
.card.pad{padding:20px}
.card.hover:hover{border-color:rgba(201,168,76,.25)}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.card-head .lbl{font-family:var(--f-m);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--steel)}
.card-head .act{margin-left:auto;font-family:var(--f-m);font-size:10px;color:var(--gold);letter-spacing:1px;cursor:pointer}
.card-head .act:hover{color:var(--gold-2)}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)} .g5{grid-template-columns:repeat(5,1fr)}
.g-2-1{grid-template-columns:2fr 1fr} .g-1-2{grid-template-columns:1fr 2fr}
.mb16{margin-bottom:16px}.mb22{margin-bottom:22px}.mt16{margin-top:16px}

/* ── KPI CARD ── */
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 16px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),transparent)}
.kpi .k-lbl{font-family:var(--f-m);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--steel)}
.kpi .k-val{font-family:var(--f-d);font-size:38px;font-weight:900;line-height:1;margin-top:8px;letter-spacing:.5px}
.kpi .k-sub{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--steel)}
.chip{font-family:var(--f-m);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.chip.up{background:rgba(74,222,128,.12);color:var(--pos)}
.chip.down{background:rgba(248,113,113,.12);color:var(--neg)}
.chip.flat{background:rgba(138,147,160,.12);color:var(--steel)}

/* ── CORE4 SIGNATURE ── */
.core4-hero{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:center}
.core4-rings{position:relative;width:260px;height:260px;margin:0 auto}
.core4-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
.core4-center .cc-lbl{font-family:var(--f-m);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--steel)}
.core4-center .cc-val{font-family:var(--f-d);font-size:54px;font-weight:900;line-height:.9;background:linear-gradient(135deg,var(--gold-3),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.core4-center .cc-tag{font-family:var(--f-m);font-size:9px;letter-spacing:1px;color:var(--gold);text-transform:uppercase;margin-top:2px}
.core4-legend{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.c4dim{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px 15px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.c4dim:hover{border-color:var(--dc);transform:translateY(-2px)}
.c4dim .d-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.c4dim .d-dot{width:10px;height:10px;border-radius:3px;background:var(--dc)}
.c4dim .d-name{font-family:var(--f-d);font-weight:800;letter-spacing:1.5px;text-transform:uppercase;font-size:13px}
.c4dim .d-arrow{margin-left:auto;color:var(--muted);font-size:15px}
.c4dim .d-val{font-family:var(--f-d);font-size:32px;font-weight:900;line-height:1}
.c4dim .d-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.08);margin-top:9px;overflow:hidden}
.c4dim .d-bar i{display:block;height:100%;border-radius:3px;background:var(--dc)}
.c4dim .d-meta{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--steel)}

/* ── PROFILE HEADER ── */
.athlete-head{background:linear-gradient(135deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:var(--radius);padding:22px 24px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
.ah-avatar{width:78px;height:78px;border-radius:16px;background:rgba(201,168,76,.1);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-size:30px;font-weight:900;color:var(--gold);flex-shrink:0}
.ah-info{flex:1;min-width:200px}
.ah-name{font-family:var(--f-d);font-size:30px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;line-height:1}
.ah-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.tag{font-family:var(--f-m);font-size:10px;font-weight:600;letter-spacing:.5px;padding:4px 9px;border-radius:7px;background:var(--panel-3);color:var(--silver);border:1px solid var(--line)}
.tag.gold{color:var(--gold);border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.07)}
.ah-scores{display:flex;gap:22px}
.ah-score{text-align:center}
.ah-score .v{font-family:var(--f-d);font-size:40px;font-weight:900;line-height:1;color:var(--gold)}
.ah-score .v.blue{color:var(--info)}
.ah-score .l{font-family:var(--f-m);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--steel);margin-top:3px}
.ah-actions{display:flex;gap:9px;flex-wrap:wrap}
/* profile completion ring */
.pc-ring{display:flex;align-items:center;gap:10px}
.pc-ring svg{width:52px;height:52px}

/* ── INSIGHT / PRIORITY ── */
.insight{display:flex;gap:12px;padding:13px 15px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--gold);margin-bottom:10px}
.insight:last-child{margin-bottom:0}
.insight.good{border-left-color:var(--pos)} .insight.watch{border-left-color:var(--warn)} .insight.bad{border-left-color:var(--neg)}
.insight .ic{width:34px;height:34px;border-radius:9px;background:var(--panel-3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.insight .tt{font-weight:600;font-size:13.5px;margin-bottom:2px}
.insight .ds{font-size:12.5px;color:var(--steel);line-height:1.5}
.priority{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
.priority .p-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.priority .p-rank{font-family:var(--f-d);font-size:20px;font-weight:900;color:var(--gold);width:26px}
.priority .p-name{font-weight:700;font-size:14px}
.priority .p-scores{margin-left:auto;font-family:var(--f-m);font-size:11px;color:var(--steel)}
.priority .p-scores b{color:var(--gold)}
.priority .p-why{font-size:12.5px;color:var(--steel);margin:4px 0 10px;line-height:1.5}
.priority .p-act{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gold-2)}
.progress{height:7px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:8px}
.progress i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold-2))}
.progress i.on{background:linear-gradient(90deg,#16a34a,var(--pos))}
.progress i.risk{background:linear-gradient(90deg,#b45309,var(--warn))}
.progress i.over{background:linear-gradient(90deg,#991b1b,var(--neg))}

/* action list */
.action{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);margin-bottom:9px;transition:all .16s;cursor:pointer}
.action:hover{border-color:rgba(201,168,76,.35);transform:translateX(2px)}
.action .a-ic{width:36px;height:36px;border-radius:10px;background:rgba(201,168,76,.1);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.action .a-tt{font-weight:600;font-size:13.5px}
.action .a-ds{font-size:11.5px;color:var(--steel)}
.action .a-go{margin-left:auto;color:var(--gold);font-family:var(--f-m);font-size:10px;letter-spacing:1px;white-space:nowrap}

/* ── METRIC ROWS ── */
.mrow{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--line)}
.mrow:last-child{border-bottom:none}
.mrow .m-nm{width:150px;flex-shrink:0;font-size:13px;color:var(--silver)}
.mrow .m-track{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden}
.mrow .m-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold-2))}
.mrow .m-fill.green{background:linear-gradient(90deg,#16a34a,var(--pos))}
.mrow .m-fill.red{background:linear-gradient(90deg,#991b1b,var(--neg))}
.mrow .m-val{width:92px;text-align:right;font-family:var(--f-m);font-weight:700;color:var(--gold);flex-shrink:0}
.mrow .m-avg{width:78px;text-align:right;font-family:var(--f-m);font-size:10px;color:var(--muted);flex-shrink:0}

/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-family:var(--f-m);font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--steel);text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{color:var(--gold)}
.tbl td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.045)}
.tbl tbody tr{transition:background .15s;cursor:pointer}
.tbl tbody tr:hover{background:rgba(201,168,76,.05)}
.tbl tbody tr:last-child td{border-bottom:none}
.av-sm{width:30px;height:30px;border-radius:8px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);display:inline-flex;align-items:center;justify-content:center;font-family:var(--f-d);font-weight:800;color:var(--gold);font-size:11px;margin-right:9px;vertical-align:middle}
.pill{font-family:var(--f-m);font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:20px;text-transform:uppercase}
.pill.g{background:rgba(74,222,128,.12);color:var(--pos)}
.pill.y{background:rgba(245,158,11,.14);color:var(--warn)}
.pill.r{background:rgba(248,113,113,.12);color:var(--neg)}
.pill.b{background:rgba(96,165,250,.12);color:var(--info)}
.pill.n{background:var(--panel-3);color:var(--steel)}
.mini-bar{display:inline-flex;align-items:center;gap:8px}
.mini-bar .mb-t{width:64px;height:6px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
.mini-bar .mb-f{height:100%;border-radius:3px;background:var(--gold)}

/* segmented / toggle */
.seg{display:inline-flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px}
.seg button{font-family:var(--f-m);font-size:11px;font-weight:700;letter-spacing:.5px;padding:7px 14px;border-radius:7px;color:var(--steel);transition:all .16s}
.seg button.active{background:var(--gold);color:#1a1206}

/* tabs (profile) */
.subtabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px;overflow-x:auto}
.subtab{font-family:var(--f-d);font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:12px 16px;color:var(--steel);border-bottom:2px solid transparent;white-space:nowrap;transition:all .16s;margin-bottom:-1px}
.subtab:hover{color:var(--white)}
.subtab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* heatmap */
.hm{width:100%;border-collapse:collapse;font-size:11px}
.hm th{font-family:var(--f-m);font-size:9px;color:var(--steel);padding:6px;text-align:center;font-weight:600}
.hm td{padding:3px;text-align:center}
.hm .cell{height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--f-m);font-size:10px;font-weight:600;color:#0a0a0a}

.g-msg.a{background:var(--panel-3);align-self:flex-start;border-bottom-left-radius:4px}
.g-msg.err{background:rgba(248,113,113,.1);color:var(--neg)}

function ring(value, size, stroke, color, track){

    var c=2*Math.PI*r, val=a.core4[d].score, off=c*(1-val/100);
    s+='<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="'+stroke+'"/>';
    s+='<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+C4[d].color+'" stroke-width="'+stroke+'" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'"><animate attributeName="stroke-dashoffset" from="'+c+'" to="'+off+'" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/></circle>';
  });
  s+='</g></svg>';
  return s;
}

function renderSidebar(){
  var items = NAV[STATE.role];

    if(it.sec) return '<div class="sb-section">'+it.sec+'</div>';
    return '<div class="nav-item'+(it.id===STATE.page?' active':'')+'" onclick="navigate(\''+it.id+'\')">'+

      (it.badge?'<span class="nav-badge">'+it.badge+'</span>':'')+'</div>';

  document.querySelectorAll('.role-pill').forEach(function(p){ p.classList.toggle('active', p.dataset.role===STATE.role); });
  var u = STATE.role==='player'?{n:ATHLETE.name,r:'Player · '+ATHLETE.team,a:ATHLETE.avatar}
        : STATE.role==='coach'?{n:'Dave Rivera',r:'Head Coach · Westlake',a:'DR'}

  document.getElementById('sbUser').innerHTML='<div class="av">'+u.a+'</div><div><div class="nm">'+u.n+'</div><div class="rl">'+u.r+'</div></div>';

function setRole(role){
  STATE.role=role; STATE.page='home'; persist();
  renderSidebar(); route();
  toggleSidebar(false);
}
function navigate(page){
  STATE.page=page; renderSidebar(); route(); toggleSidebar(false);
  document.querySelector('.view').scrollTop=0; window.scrollTo(0,0);
}
function toggleSidebar(open){
  var sb=document.getElementById('sidebar'), sc=document.getElementById('scrim');
  var show = open===undefined ? !sb.classList.contains('open') : open;
  sb.classList.toggle('open',show); sc.classList.toggle('open',show);
}

var _charts={};
function destroyCharts(){ Object.keys(_charts).forEach(function(k){ try{_charts[k].destroy();}catch(e){} }); _charts={}; }

function route(){
  destroyCharts();
  var role=STATE.role, page=STATE.page;
  var fn = (PAGES[role]&&PAGES[role][page]) || PAGES[role].home;
  var t = (TITLES[page]&&TITLES[page][role]) || page;
  document.getElementById('tbTitle').textContent = t;
  document.getElementById('tbKick').textContent = 'Lanista IQ · '+role.charAt(0).toUpperCase()+role.slice(1);
  var out = fn();
  document.getElementById('view').innerHTML = out.html;
  if(out.after) out.after();
}

function kpi(lbl,val,sub,dir){
  var chip = dir==='up'?'<span class="chip up">▲</span>':dir==='down'?'<span class="chip down">▼</span>':'<span class="chip flat">■</span>';
  return '<div class="kpi"><div class="k-lbl">'+lbl+'</div><div class="k-val">'+val+'</div><div class="k-sub">'+chip+sub+'</div></div>';
}
function insight(ic,t,d,type){
  return '<div class="insight '+(type||'')+'"><div class="ic">'+ic+'</div><div><div class="tt">'+t+'</div><div class="ds">'+d+'</div></div></div>';
}
function priorityRow(p,rank,showBar){
  var cls = p.status==='risk'?'risk':p.status==='over'?'over':'on';
  return '<div class="priority">'+
    '<div class="p-top"><span class="p-rank">'+rank+'</span><span class="p-name">'+p.title+'</span>'+
      '<span class="p-scores">Now <b>'+p.cur+'</b> · Target '+p.target+'</span></div>'+
    '<div class="p-why">'+p.why+'</div>'+
    '<div class="progress"><i class="'+cls+'" style="width:'+p.progress+'%"></i></div>'+
    '<div class="p-act" style="margin-top:9px"><span style="font-family:var(--f-m);font-size:10px;color:'+(p.status==='risk'?'var(--warn)':'var(--pos)')+'">'+p.progress+'% · '+(p.status==='risk'?'Needs attention':'On track')+'</span>'+
      '<span style="margin-left:auto;color:var(--gold-2);cursor:pointer" onclick="navigate(\'resources\')">Recommended drills →</span></div>'+
  '</div>';
}
function resourceRow(r){
  var icon = r.type==='video'?'▶️':'📄';
  return '<div class="action" onclick="showToast(\'Opening: '+r.title.replace(/'/g,'')+'\',\'gold\')"><div class="a-ic">'+icon+'</div>'+
    '<div><div class="a-tt">'+r.title+'</div><div class="a-ds">'+r.source+' · '+r.meta+'</div></div>'+
    '<span class="r-tier tier-'+r.tier+'">'+r.tier+'</span></div>';
}
function resourceCard(r){
  var icon = r.type==='video'?'🎬':'📘';
  return '<div class="res" onclick="showToast(\'Opening: '+r.title.replace(/'/g,'')+'\',\'gold\')">'+
    '<div class="r-top"><span class="r-type">'+icon+'</span><span class="tag">'+r.tag+'</span><span class="r-tier tier-'+r.tier+'">'+r.tier+'</span></div>'+
    '<div class="r-tt">'+r.title+'</div><div class="r-mt">'+r.source+' · '+r.meta+'</div></div>';
}
function filterRes(type,btn){
  if(btn){ btn.parentElement.querySelectorAll('button').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); }
  var list = type==='all'?RESOURCES:RESOURCES.filter(function(r){return r.type===type;});
  var el=document.getElementById('resGrid'); if(el) el.innerHTML=list.map(resourceCard).join('');
}

function teamHeader(){
  var tc=teamCore4();

    '<div class="ah-info"><div class="ah-name">Westlake Warriors</div>'+
    '<div class="ah-meta"><span class="tag">Coach Dave Rivera</span><span class="tag">2026 Season</span><span class="tag">18–7 Record</span><span class="tag gold">'+ROSTER.length+' Athletes</span></div>'+

    '<div class="ah-actions"><button class="btn gold" onclick="navigate(\'athletes\')">Athlete Matrix</button></div></div>';
}
function attentionCenter(){
  var rising=ROSTER.filter(function(p){return p.trend>=6;}).sort(function(a,b){return b.trend-a.trend;}).slice(0,2);
  var falling=ROSTER.filter(function(p){return p.trend<0;});
  var overdue=ROSTER.filter(function(p){return p.assess==='overdue'||p.assess==='pending';});
  var items=[];
  falling.forEach(function(p){items.push({ic:'⚠️',t:p.name+' trending down',d:'CORE4 '+p.trend+' this cycle · Mentality '+p.mentality+'. Recommend a 1-on-1 check-in.',ty:'bad',pl:p});});
  overdue.filter(function(p){return p.assess==='overdue';}).forEach(function(p){items.push({ic:'⏰',t:p.name+' — assessment overdue',d:'Streak broken · last check-in 2+ weeks ago.',ty:'watch',pl:p});});
  rising.forEach(function(p){items.push({ic:'🚀',t:p.name+' improving fast',d:'CORE4 +'+p.trend+' · '+p.streak+'-week streak. Reinforce what\'s working.',ty:'good',pl:p});});
  overdue.filter(function(p){return p.assess==='pending';}).forEach(function(p){items.push({ic:'📋',t:p.name+' — assessment pending',d:'Nudge to complete this week\'s check-in.',ty:'watch',pl:p});});
  return items.map(function(x){return '<div class="insight '+x.ty+'" style="cursor:pointer" onclick="openAthlete(\''+x.pl.name+'\')"><div class="ic">'+x.ic+'</div><div><div class="tt">'+x.t+'</div><div class="ds">'+x.d+'</div></div><div style="margin-left:auto;align-self:center;color:var(--gold);font-family:var(--f-m);font-size:10px">OPEN →</div></div>';}).join('');
}

var _matrixSort='core4', _matrixDir=-1, _matrixFilter='';
function matrixFilter(v){ _matrixFilter=v; renderMatrix(); }
function sortMatrix(k){ if(_matrixSort===k) _matrixDir*=-1; else {_matrixSort=k;_matrixDir=-1;} renderMatrix(); }
function renderMatrix(){
  var body=document.getElementById('matrixBody'); if(!body) return;
  var list=ROSTER.slice();
  if(_matrixFilter){ list=list.filter(function(p){ var g=p.pos; if(_matrixFilter==='P')return /P/.test(g); if(_matrixFilter==='C')return /^C/.test(g); if(_matrixFilter==='IF')return /(1B|2B|3B|SS)/.test(g); if(_matrixFilter==='OF')return /(CF|LF|RF|OF)/.test(g); return true;}); }
  list.sort(function(a,b){ var av=_matrixSort==='core4'?rosterCore4(a):a[_matrixSort], bv=_matrixSort==='core4'?rosterCore4(b):b[_matrixSort];
    if(typeof av==='string') return av.localeCompare(bv)*_matrixDir; return (av-bv)*_matrixDir; });
  body.innerHTML=list.map(function(p){
    var st=p.assess==='complete'?'<span class="pill g">Complete</span>':p.assess==='overdue'?'<span class="pill r">Overdue</span>':'<span class="pill y">Pending</span>';
    return '<tr onclick="openAthlete(\''+p.name+'\')"><td><span class="av-sm">'+initials(p.name)+'</span>'+p.name+'</td>'+
      '<td class="mono mut">'+p.pos+'</td><td class="mono mut">'+p.cls+'</td>'+
      '<td class="mono" style="color:var(--gold);font-weight:700">'+rosterCore4(p)+'</td>'+
      ['talent','character','mentality','alignment'].map(function(d){return '<td class="mono" style="color:'+C4[d].color+'">'+p[d]+'</td>';}).join('')+
      '<td>'+trendChip(p.trend)+'</td><td>'+st+'</td></tr>';
  }).join('');
}

  var inp=document.getElementById('gInput'),msg=(inp.value||'').trim(); if(!msg) return; inp.value=''; gAppend('u',msg);
  var a=ATHLETE;
  var ctx='You are Gladius, an elite AI performance coach for Lanista Sports. Current role view: '+STATE.role+'. Athlete context — '+a.name+' ('+a.pos+', Class of '+a.grad+'): Lanista IQ '+a.lanistaIQ+', LS4 '+a.ls4+', CORE4 Talent '+a.core4.talent.score+'/Character '+a.core4.character.score+'/Mentality '+a.core4.mentality.score+'/Alignment '+a.core4.alignment.score+', Exit Velo '+a.exitVelo+' mph, Pitch Velo '+a.pitchVelo+' mph. Be concise, specific, and give one actionable tip.';
  var typing=document.createElement('div'); typing.className='g-msg a'; typing.textContent='…'; typing.id='gTyping'; document.getElementById('gMsgs').appendChild(typing);
  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,context:ctx})})
    .then(function(r){return r.json();}).then(function(d){ var t=document.getElementById('gTyping'); if(t)t.remove();
      if(d && (d.response||d.content)){ gAppend('a', d.response || (d.content&&d.content[0]&&d.content[0].text) || d.content); }
      else if(d && d.error){ gAppend('err','Gladius is offline: '+(d.error.message||'API key not configured.')); }
      else { gAppend('err','No response.'); }
    }).catch(function(){ var t=document.getElementById('gTyping'); if(t)t.remove(); gAppend('err','Connection error. Try again.'); });
}
document.getElementById('gInput').addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault();sendGladius();} });
document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ closeModal(); closeDrawer(); } });

/* ── INIT ── */
try {
  var qp = new URLSearchParams(location.search);
  var qr = qp.get('role'); if(qr && NAV[qr]){ STATE.role = qr; persist(); }
  var qpg = qp.get('page'); if(qpg){ STATE.page = qpg; }
} catch(e){}
renderSidebar();
route();
</script>
